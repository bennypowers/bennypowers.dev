<template shadowroot="open"
          shadowrootmode="open">
  <link rel="stylesheet"
        href="components/shared.css">
  <link rel="stylesheet"
        href="components/rh-slide.css">
  <div id="container"
       part="container">
    <header id="slide-header">
      <slot name="heading"></slot>
      <small id="confidential">
        <slot name="confidential"></slot>
      </small>
    </header>
    <div id="image-left">
      <slot name="image-left"></slot>
    </div>
    <section id="content"
             part="content">
      <slot></slot>
      <div id="split-screen">
        <div id="left">
          <slot name="left"></slot>
        </div>
        <div id="right">
          <slot name="right"></slot>
        </div>
      </div>
    </section>
    <div id="image-right">
      <slot name="image-right"></slot>
    </div>
    <div id="chevron-process">
      <div class="chevron">
        <slot name="chevron-1"></slot>
      </div>
      <div class="chevron">
        <slot name="chevron-2"></slot>
      </div>
      <div class="chevron">
        <slot name="chevron-3"></slot>
      </div>
    </div>
    <footer id="slide-footer">
      <span id="counter"
            part="counter"></span>
      <slot name="footer"></slot>
      <img id="logo"
           alt="red hat"
           src="/decks/gaad-2026/images/red-hat.svg">
    </footer>
  </div>
  <slot hidden
        name="notes"></slot>
</template>
