<meta itemprop="description" content="Window manager state machine test fixture with multiple windows">

<style>
  .demo {
    height: 600px;
    border: 1px solid #888;
    overflow: hidden;
  }
</style>

<div class="demo">
  <gnome2-desktop page-url="/demo/" page-title="Window A" page-icon="apps/accessories-text-editor">
    <gnome2-panel slot="top-panel" position="top">
      <gnome2-session slot="start"></gnome2-session>
      <gnome2-clock slot="end"></gnome2-clock>
    </gnome2-panel>

    <gtk2-window id="window-a"
                 label="Window A"
                 icon="apps/accessories-text-editor"
                 window-url="/demo/"
                 focused
                 style="position: absolute; width: 400px; height: 250px; inset-block-start: 20px; inset-inline-start: 20px; margin: 0;">
      <p>Window A content</p>
    </gtk2-window>

    <gtk2-window id="window-b"
                 label="Window B"
                 icon="apps/internet-web-browser"
                 window-url="/demo-b/"
                 style="position: absolute; width: 400px; height: 250px; inset-block-start: 60px; inset-inline-start: 120px; margin: 0;">
      <p>Window B content</p>
    </gtk2-window>

    <gnome2-panel slot="bottom-panel" position="bottom">
      <gnome2-window-list></gnome2-window-list>
      <gnome2-workspace-switcher slot="end" count="4"></gnome2-workspace-switcher>
    </gnome2-panel>
  </gnome2-desktop>
</div>

<script type="module">
  import 'gnome2/gnome2-desktop/gnome2-desktop.js';
  import 'gnome2/gnome2-panel/gnome2-panel.js';
  import 'gnome2/gnome2-session/gnome2-session.js';
  import 'gnome2/gnome2-clock/gnome2-clock.js';
  import 'gnome2/gnome2-window-list/gnome2-window-list.js';
  import 'gnome2/gnome2-workspace-switcher/gnome2-workspace-switcher.js';
  import 'gnome2/gtk2-window/gtk2-window.js';
  import 'gnome2/gtk2-menu-bar/gtk2-menu-bar.js';
  import 'gnome2/gtk2-menu-button/gtk2-menu-button.js';
  import 'gnome2/gtk2-menu-item/gtk2-menu-item.js';
  import 'gnome2/gtk2-menu/gtk2-menu.js';
</script>
